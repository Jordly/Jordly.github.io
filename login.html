<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chanseen CS CloudHub - 登录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(160deg, #0A1628 0%, #0F1F3A 25%, #162B4A 50%, #0A1F2E 75%, #0A1628 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== 背景粒子动画 ===== */
    .bg-particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-particles .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(10, 186, 181, 0.12);
      animation: particleFloat linear infinite;
    }

    .bg-particles .particle:nth-child(1) {
      width: 6px; height: 6px;
      left: 15%;
      animation-duration: 18s;
      animation-delay: 0s;
    }

    .bg-particles .particle:nth-child(2) {
      width: 4px; height: 4px;
      left: 35%;
      background: rgba(212, 175, 55, 0.1);
      animation-duration: 22s;
      animation-delay: 3s;
    }

    .bg-particles .particle:nth-child(3) {
      width: 5px; height: 5px;
      left: 55%;
      animation-duration: 20s;
      animation-delay: 6s;
    }

    .bg-particles .particle:nth-child(4) {
      width: 3px; height: 3px;
      left: 75%;
      background: rgba(212, 175, 55, 0.08);
      animation-duration: 25s;
      animation-delay: 9s;
    }

    .bg-particles .particle:nth-child(5) {
      width: 4px; height: 4px;
      left: 90%;
      animation-duration: 16s;
      animation-delay: 12s;
    }

    @keyframes particleFloat {
      0% {
        bottom: -20px;
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        bottom: 110%;
        opacity: 0;
      }
    }

    /* ===== 极光色带 ===== */
    .aurora {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .aurora-band {
      position: absolute;
      width: 200%;
      height: 200px;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.25;
      animation: auroraDrift ease-in-out infinite;
    }

    .aurora-band:nth-child(1) {
      background: linear-gradient(90deg, transparent 0%, #00FFB9 20%, #0ABAB5 50%, #9B59B6 80%, transparent 100%);
      top: 15%;
      animation-duration: 35s;
      opacity: 0.35;
    }

    .aurora-band:nth-child(2) {
      background: linear-gradient(90deg, transparent 0%, #0ABAB5 30%, #6C5CE7 60%, transparent 100%);
      top: 35%;
      animation-duration: 42s;
      animation-direction: reverse;
      opacity: 0.3;
    }

    .aurora-band:nth-child(3) {
      background: linear-gradient(90deg, transparent 0%, #00D4AA 25%, #0ABAB5 55%, #A29BFE 85%, transparent 100%);
      top: 55%;
      animation-duration: 30s;
      opacity: 0.25;
    }

    @keyframes auroraDrift {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(50%); }
    }

    /* ===== 繁星点点 ===== */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: starTwinkle ease-in-out infinite;
    }

    .star:nth-child(1)  { left:  5%; top:  8%; animation-duration: 3.2s; animation-delay: 0.0s; }
    .star:nth-child(2)  { left: 12%; top: 22%; animation-duration: 2.8s; animation-delay: 0.5s; }
    .star:nth-child(3)  { left: 18%; top: 45%; animation-duration: 3.5s; animation-delay: 1.0s; }
    .star:nth-child(4)  { left: 25%; top: 12%; animation-duration: 2.5s; animation-delay: 1.5s; }
    .star:nth-child(5)  { left: 32%; top: 68%; animation-duration: 3.8s; animation-delay: 0.3s; width: 3px; height: 3px; }
    .star:nth-child(6)  { left: 38%; top: 33%; animation-duration: 2.9s; animation-delay: 2.0s; }
    .star:nth-child(7)  { left: 45%; top: 55%; animation-duration: 3.1s; animation-delay: 0.8s; }
    .star:nth-child(8)  { left: 52%; top: 18%; animation-duration: 2.6s; animation-delay: 1.2s; width: 3px; height: 3px; }
    .star:nth-child(9)  { left: 58%; top: 78%; animation-duration: 3.4s; animation-delay: 0.2s; }
    .star:nth-child(10) { left: 65%; top: 42%; animation-duration: 2.7s; animation-delay: 1.8s; }
    .star:nth-child(11) { left: 72%; top: 15%; animation-duration: 3.6s; animation-delay: 0.6s; width: 3px; height: 3px; }
    .star:nth-child(12) { left: 78%; top: 60%; animation-duration: 2.4s; animation-delay: 2.5s; }
    .star:nth-child(13) { left: 85%; top: 28%; animation-duration: 3.3s; animation-delay: 0.4s; }
    .star:nth-child(14) { left: 92%; top: 72%; animation-duration: 2.8s; animation-delay: 1.6s; width: 3px; height: 3px; }
    .star:nth-child(15) { left:  8%; top: 88%; animation-duration: 3.0s; animation-delay: 0.9s; }
    .star:nth-child(16) { left: 15%; top: 52%; animation-duration: 2.5s; animation-delay: 2.2s; }
    .star:nth-child(17) { left: 28%; top: 92%; animation-duration: 3.7s; animation-delay: 0.1s; }
    .star:nth-child(18) { left: 42%; top: 38%; animation-duration: 2.9s; animation-delay: 1.4s; width: 3px; height: 3px; }
    .star:nth-child(19) { left: 55%; top: 82%; animation-duration: 3.2s; animation-delay: 0.7s; }
    .star:nth-child(20) { left: 68%; top: 48%; animation-duration: 2.6s; animation-delay: 2.8s; }
    .star:nth-child(21) { left: 82%; top: 92%; animation-duration: 3.4s; animation-delay: 0.3s; width: 3px; height: 3px; }
    .star:nth-child(22) { left: 88%; top: 35%; animation-duration: 2.7s; animation-delay: 1.1s; }
    .star:nth-child(23) { left: 95%; top: 65%; animation-duration: 3.5s; animation-delay: 0.5s; }
    .star:nth-child(24) { left: 48%; top:  5%; animation-duration: 2.8s; animation-delay: 2.4s; width: 3px; height: 3px; }
    .star:nth-child(26) { left: 22%; top: 72%; animation-duration: 3.3s; animation-delay: 1.1s; width: 3px; height: 3px; }
    .star:nth-child(27) { left: 35%; top:  5%; animation-duration: 2.7s; animation-delay: 2.2s; }
    .star:nth-child(28) { left: 48%; top: 62%; animation-duration: 3.6s; animation-delay: 0.4s; width: 3px; height: 3px; }
    .star:nth-child(29) { left: 62%; top: 88%; animation-duration: 2.9s; animation-delay: 1.7s; }
    .star:nth-child(30) { left: 75%; top: 35%; animation-duration: 3.4s; animation-delay: 0.2s; width: 3px; height: 3px; }
    .star:nth-child(31) { left: 82%; top: 52%; animation-duration: 2.6s; animation-delay: 2.8s; }
    .star:nth-child(32) { left: 92%; top: 18%; animation-duration: 3.1s; animation-delay: 1.4s; width: 3px; height: 3px; }
    .star:nth-child(33) { left: 10%; top: 75%; animation-duration: 2.8s; animation-delay: 0.7s; }
    .star:nth-child(34) { left: 55%; top: 28%; animation-duration: 3.5s; animation-delay: 2.1s; width: 3px; height: 3px; }
    .star:nth-child(35) { left: 88%; top: 45%; animation-duration: 2.5s; animation-delay: 1.9s; }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%        { opacity: 1;   transform: scale(1.4); }
    }

    /* ===== 流星（从右上角到左下角 · 近处·较亮） ===== */
    .shooting-star {
      position: fixed;
      width: 140px;
      height: 2px;
      background: linear-gradient(90deg, white, rgba(255,255,255,0.8), transparent);
      border-radius: 2px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transform: rotate(-45deg);
      animation: shoot 4s linear infinite backwards;
    }

    /* ===== 流星2（从正上方中间到左下方 · 远处·较暗） ===== */
    .shooting-star2 {
      position: fixed;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.15), transparent);
      border-radius: 1px;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transform: rotate(-55deg);
      animation: shoot2 2s linear infinite backwards;
    }

    @keyframes shoot {
      0%   { opacity: 0;   top: -20px; left: 110%; }
      8%   { opacity: 1; }
      35%  { opacity: 1; }
      50%  { opacity: 0;   top: 120vh; left: -20px; }
      100% { opacity: 0; }
    }

    @keyframes shoot2 {
      0%   { opacity: 0;   top: -20px; left: 50%; }
      8%   { opacity: 0.6; }
      35%  { opacity: 0.6; }
      50%  { opacity: 0;   top: 120vh; left: -80%; }
      100% { opacity: 0; }
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10, 186, 181, 0.2) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat1 12s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-80px, 60px) scale(1.05); }
      66% { transform: translate(40px, -40px) scale(0.95); }
    }

    /* 第二个光晕 */
    .bg-orb-2 {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
      bottom: -100px;
      left: -50px;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, -80px) scale(1.08); }
    }

    /* ===== 顶部导航 ===== */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .nav-logo svg {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 8px rgba(56,189,248,0.5));
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-links a {
      padding: 8px 16px;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .nav-links a.active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    /* ===== 主内容区 ===== */
    .main-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
      gap: 80px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ===== 左侧品牌区 ===== */
    .brand-section {
      flex: 1;
      max-width: 580px;
      color: white;
      align-self: center;
    }

    .brand-title {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      color: #ffffff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.08);
    }

    .brand-title em {
      font-style: normal;
      background: linear-gradient(135deg, #0ABAB5, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-subtitle {
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 36px;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 1px 12px rgba(0,0,0,0.25);
    }

    .brand-subtitle p {
      margin: 0;
    }

    /* 特性卡片网格 */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: default;
      animation: cardBreath 4s ease-in-out infinite;
      animation-delay: calc(var(--i, 0) * 0.5s);
    }

    .feature-card:nth-child(1) { --i: 0; }
    .feature-card:nth-child(2) { --i: 1; }
    .feature-card:nth-child(3) { --i: 2; }
    .feature-card:nth-child(4) { --i: 3; }

    @keyframes cardBreath {
      0%, 100% { box-shadow: 0 0 0 rgba(10,186,181,0); }
      50% { box-shadow: 0 0 20px rgba(10,186,181,0.08); }
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(10, 186, 181, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), 0 0 30px rgba(10, 186, 181, 0.12);
    }

    .feature-icon {
      width: 42px;
      height: 42px;
      background: rgba(10, 186, 181, 0.18);
      border: 1px solid rgba(10, 186, 181, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffffff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }

    .feature-desc {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
    }

    /* ===== 右侧登录卡片 ===== */
    .login-card {
      width: 420px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 24px;
      padding: 44px 40px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 0 80px rgba(10, 186, 181, 0.06);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .login-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 35px 80px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(212,175,55,0.1) inset,
        0 0 100px rgba(10, 186, 181, 0.1);
    }

    /* 卡片淡金色光晕边框 */
    .login-card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, rgba(212,175,55,0.25), transparent 50%, rgba(10,186,181,0.15));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .login-card:hover::before {
      opacity: 1;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .login-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    /* 输入框 */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.5;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      font-size: 14px;
      color: white;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      transition: all 0.25s ease;
      outline: none;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .input-group input:focus {
      border-color: rgba(10, 186, 181, 0.6);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(10, 186, 181, 0.12), 0 0 20px rgba(10, 186, 181, 0.08);
      animation: inputGlowSweep 0.6s ease-out;
    }

    @keyframes inputGlowSweep {
      0% {
        box-shadow: 0 0 0 3px rgba(212,175,55,0), 0 0 0 rgba(10,186,181,0);
      }
      50% {
        box-shadow: 0 0 0 3px rgba(212,175,55,0.15), 0 0 15px rgba(212,175,55,0.08);
      }
      100% {
        box-shadow: 0 0 0 3px rgba(10, 186, 181, 0.12), 0 0 20px rgba(10,186,181,0.08);
      }
    }

    .input-group input:focus + .input-icon {
      opacity: 0.9;
    }

    /* 密码框 */
    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: #7dd3fc;
    }

    /* 记住我 */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .remember-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #0ea5e9;
      cursor: pointer;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0B7A7A 0%, #0ABAB5 50%, #0C9A99 100%);
      color: white;
      border: 1.5px solid rgba(212, 175, 55, 0.25);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(10, 186, 181, 0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    /* 微光流动动画 */
    .btn-login::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(212,175,55,0.06) 25%, transparent 50%);
      animation: btnGlow 4s linear infinite;
      pointer-events: none;
    }

    @keyframes btnGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 光泽扫过动画 */
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.6s ease;
      z-index: 1;
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(10, 186, 181, 0.4), 0 0 0 1px rgba(212,175,55,0.15) inset;
      background: linear-gradient(135deg, #0C8B8A 0%, #0BBAB5 50%, #0CA9A9 100%);
      border-color: rgba(212, 175, 55, 0.35);
    }

    .btn-login:hover::after {
      animation-duration: 2.5s;
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 底部链接 */
    .login-footer {

      <form id="loginForm" onsubmit="return doLogin(event)">

          <input type="text" id="username" placeholder="用户名 / 邮箱" required>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 如果已登录，自动跳转到系统
    if (localStorage.getItem('chanseen_auth')) {
      try {
        const auth = JSON.parse(localStorage.getItem('chanseen_auth'));
        if (auth && auth.token) {
          window.location.href = 'index.html?from=login&_=' + Date.now();
        }
      } catch(e) {}
    }

    // 切换密码可见性
    function togglePassword() {
      const input = document.getElementById('password');
      const eye = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = '👁️';
      } else {
        input.type = 'password';
        eye.textContent = '🙈';
      }
    }

    // Toast 通知
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      toast.innerHTML = `
        <span style="font-size:20px;">${icons[type] || icons.info}</span>
        <span style="font-size:14px;color:rgba(255,255,255,0.92);">${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // 登录处理
    function doLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      if (!username || !password) {
        showToast('请输入用户名和密码', 'error');
        return false;
      }

      // 加载状态
      btnText.textContent = '登录中...';
      btn.disabled = true;
      btn.style.opacity = '0.8';

      // 模拟登录验证（1秒后）
      setTimeout(() => {
        // 记录登录失败
    function recordFailedLogin(username) {
      try {
        var os = '未知';
        var device = 'desktop';
        var ua = navigator.userAgent || '';
        // HarmonyOS 优先检测
        if (ua.indexOf('HarmonyOS') !== -1 || ua.indexOf('OpenHarmony') !== -1) { os = 'HarmonyOS'; device = 'mobile'; }
        else if (ua.indexOf('iPhone') !== -1 || ua.indexOf('iPad') !== -1) { os = 'iOS'; device = 'mobile'; }
        else if (ua.indexOf('Android') !== -1) { os = 'Android'; device = 'mobile'; }
        else if (ua.indexOf('Windows') !== -1) { os = 'Windows'; }
        else if (ua.indexOf('Mac') !== -1) { os = 'macOS'; }
        else if (ua.indexOf('Linux') !== -1) {
          if (ua.indexOf('HUAWEI') !== -1 || ua.indexOf('honor') !== -1) { os = 'HarmonyOS'; }
          else { os = 'Linux'; }
        }
        // 设备类型细化
        if (os === 'iOS' && navigator.maxTouchPoints > 0 && window.innerWidth >= 768) device = 'tablet';
        if (!os.includes('Harmony') && window.innerWidth <= 768) device = 'mobile';
        var record = {
          _id: 'login_' + Date.now(),
          username: username,
          os: os,
          device: device,
          status: '登录失败',
          loginTime: new Date().toISOString()
        };
        var logs = [];
        try { logs = JSON.parse(localStorage.getItem('chansee_login_logs') || '[]'); } catch(e) {}
        logs.unshift(record);
        if (logs.length > 20) logs = logs.slice(0, 20);
        localStorage.setItem('chansee_login_logs', JSON.stringify(logs));
      } catch(e) {}
    }

    // 内置默认用户（首次部署时兜底）
        var defaultUsers = [
          {id:"U001", username:"admin", password:"admin666", name:"admin", nickname:"", role:"超级管理员", position:"", birthday:""},
          {id:"U002", username:"jordly", password:"jordly1218", name:"jordly", nickname:"", role:"管理员", position:"", birthday:""}
        ];
        // 从 localStorage 读取用户数据，然后合并默认用户（默认用户覆盖同名旧数据）
        var savedUsers = [];
        try { savedUsers = JSON.parse(localStorage.getItem('chansee_users') || '[]'); } catch(e) {}

        // 合并默认用户：确保默认账号始终可用
        for (var di = 0; di < defaultUsers.length; di++) {
          var foundIdx = -1;
          for (var si = 0; si < savedUsers.length; si++) {
            if (savedUsers[si].username === defaultUsers[di].username) { foundIdx = si; break; }
          }
          if (foundIdx >= 0) {
            // 同名用户存在，更新密码和角色（确保与默认一致）
            savedUsers[foundIdx].password = defaultUsers[di].password;
            savedUsers[foundIdx].role = defaultUsers[di].role;
            savedUsers[foundIdx].name = defaultUsers[di].name;
            savedUsers[foundIdx].id = defaultUsers[di].id;
            savedUsers[foundIdx].nickname = defaultUsers[di].nickname;
          } else {
            savedUsers.push(defaultUsers[di]);
          }
        }

        // 查找用户
        var foundUser = null;
        for (var i = 0; i < savedUsers.length; i++) {
          if (savedUsers[i].username === username) { foundUser = savedUsers[i]; break; }
        }
        // 用户不存在
        if (!foundUser) {
          recordFailedLogin(username);
          btnText.textContent = '登 录';
          btn.disabled = false;
          btn.style.opacity = '1';
          showToast('用户名或密码错误', 'error');
          return;
        }
        // 验证密码
        if (foundUser.password !== password) {
          recordFailedLogin(username);
          btnText.textContent = '登 录';
          btn.disabled = false;
          btn.style.opacity = '1';
          showToast('用户名或密码错误', 'error');
          return;
        }

        const auth = {
          token: 'demo_' + Date.now(),
          user: {
            id: foundUser.id,
            username: foundUser.username,
            name: foundUser.name || username,
            role: foundUser.role || '超级管理员',
            nickname: foundUser.nickname || '',
            position: foundUser.position || '',
            birthday: foundUser.birthday || ''
          },
          loginAt: Date.now(),
          remember: remember
        };
        localStorage.setItem('chanseen_auth', JSON.stringify(auth));

        showToast('登录成功！正在进入系统...', 'success');

        setTimeout(() => {
          window.location.href = 'index.html?from=login&_=' + Date.now();
        }, 800);
      }, 800);

      return false;
    }

    // 回车登录
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        doLogin(e);
      }
    });
  </script>
