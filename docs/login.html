<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chanseen CS CloudHub - 登录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== 顶部导航 ===== */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      text-decoration: none;
    }

    .nav-logo svg {
      width: 28px;
      height: 28px;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-links a {
      padding: 8px 16px;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .nav-links a.active {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* ===== 主内容区 ===== */
    .main-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
      gap: 60px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* ===== 左侧品牌区 ===== */
    .brand-section {
      flex: 1;
      max-width: 560px;
      color: white;
    }

    .brand-title {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .brand-subtitle {
      font-size: 16px;
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 40px;
      color: rgba(255, 255, 255, 0.92);
    }

    .brand-subtitle p {
      margin: 0;
    }

    /* 特性卡片网格 */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: default;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: white;
    }

    .feature-desc {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    /* ===== 右侧登录卡片 ===== */
    .login-card {
      width: 400px;
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: #94a3b8;
    }

    /* 输入框 */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      color: #1e293b;
      background: white;
      transition: all 0.2s ease;
      outline: none;
    }

    .input-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .input-group input::placeholder {
      color: #94a3b8;
    }

    /* 密码框 */
    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #94a3b8;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: #667eea;
    }

    /* 记住我 */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
    }

    .remember-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 底部链接 */
    .login-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 13px;
    }

    .login-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      transform: translateX(400px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      border-left: 4px solid #667eea;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-success { border-left-color: #22c55e; }
    .toast-error { border-left-color: #ef4444; }

    /* 响应式 */
    @media (max-width: 1024px) {
      .main-container {
        flex-direction: column;
        gap: 40px;
        padding: 30px 24px;
      }

      .brand-section {
        max-width: 100%;
        text-align: center;
      }

      .brand-title {
        font-size: 32px;
      }

      .feature-grid {
        max-width: 500px;
        margin: 0 auto;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
      }
    }

    @media (max-width: 640px) {
      .top-nav {
        padding: 12px 20px;
      }

      .nav-links {
        display: none;
      }

      .brand-title {
        font-size: 28px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .login-card {
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="login.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      Chanseen CS CloudHub
    </a>
    <div class="nav-links">
      <a href="login.html" class="active">首页</a>
      <a href="#features">功能</a>
      <a href="#pricing">帮助</a>
      <a href="#docs">文档</a>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="main-container">
    <!-- 左侧品牌区 -->
    <div class="brand-section">
      <h1 class="brand-title">
        客服项目<br>
        统一管理平台
      </h1>
      <div class="brand-subtitle">
        <p>为客服团队打造的一站式项目管理解决方案</p>
        <p>支持多地团队协同，实时数据看板，智能工具引擎</p>
      </div>

      <div class="feature-grid" id="features">
        <div class="feature-card">
          <div class="feature-icon">🏢</div>
          <div class="feature-title">多职场协同</div>
          <div class="feature-desc">济南/淄博/杭州/无锡团队全域管控</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📊</div>
          <div class="feature-title">多项目支持</div>
          <div class="feature-desc">TP/DP/BPO项目全模式灵活切换</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📈</div>
          <div class="feature-title">实时看板</div>
          <div class="feature-desc">一站式查看进度、成本、服务指标</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🧰</div>
          <div class="feature-title">工具知识引擎</div>
          <div class="feature-desc">内置工具库+企业知识库</div>
        </div>
      </div>
    </div>

    <!-- 右侧登录卡片 -->
    <div class="login-card">
      <div class="login-header">
        <h2>欢迎回来</h2>
        <p>登录您的账户以继续</p>
      </div>

      <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="input-group">
          <input type="text" id="username" placeholder="用户名 / 邮箱" required>
        </div>

        <div class="input-group">
          <div class="password-wrap">
            <input type="password" id="password" placeholder="密码" required>
            <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
              <span id="eye-icon">🙈</span>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember" checked>
            <span>1小时内免登录</span>
          </label>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">登录</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="javascript:void(0)" onclick="showToast('请联系管理员重置密码', 'info')">忘记密码？</a>
        <a href="javascript:void(0)" onclick="showToast('注册功能开发中，请联系管理员', 'info')">注册账号</a>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 如果已登录，自动跳转到系统
    if (localStorage.getItem('chanseen_auth')) {
      try {
        const auth = JSON.parse(localStorage.getItem('chanseen_auth'));
        if (auth && auth.token) {
          window.location.href = 'index.html';
        }
      } catch(e) {}
    }

    // 切换密码可见性
    function togglePassword() {
      const input = document.getElementById('password');
      const eye = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = '👁️';
      } else {
        input.type = 'password';
        eye.textContent = '🙈';
      }
    }

    // Toast 通知
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      toast.innerHTML = `
        <span style="font-size:20px;">${icons[type] || icons.info}</span>
        <span style="font-size:14px;color:#1e293b;">${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // 登录处理
    function doLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      if (!username || !password) {
        showToast('请输入用户名和密码', 'error');
        return false;
      }

      // 加载状态
      btnText.textContent = '登录中...';
      btn.disabled = true;
      btn.style.opacity = '0.8';

      // 模拟登录验证（1秒后）
      setTimeout(() => {
        // 从 USERS 数组查找匹配用户，获取完整信息
        var savedUsers = [];
        try { savedUsers = JSON.parse(localStorage.getItem('chansee_users') || '[]'); } catch(e) {}
        var foundUser = null;
        for (var i = 0; i < savedUsers.length; i++) {
          if (savedUsers[i].username === username) { foundUser = savedUsers[i]; break; }
        }
        // 如果没找到，用输入的信息构建基础对象
        if (!foundUser) { foundUser = { id: 'U001', username: username, name: username, role: '超级管理员' }; }

        const auth = {
          token: 'demo_' + Date.now(),
          user: {
            id: foundUser.id,
            username: foundUser.username,
            name: foundUser.name || username,
            role: foundUser.role || '超级管理员',
            nickname: foundUser.nickname || '',
            position: foundUser.position || '',
            birthday: foundUser.birthday || ''
          },
          loginAt: Date.now(),
          remember: remember
        };
        localStorage.setItem('chanseen_auth', JSON.stringify(auth));

        showToast('登录成功！正在进入系统...', 'success');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      }, 800);

      return false;
    }

    // 回车登录
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        doLogin(e);
      }
    });
  </script>

</body>
</html>
