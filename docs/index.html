<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Chanseen | CS CloudHub</title>
<link rel="stylesheet" href="style.css?v=202606021630">
</head>
<body>
<!-- 顶部导航 -->
<header id="top-header">
  <button id="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="打开菜单">☰</button>
  <div class="header-left">
    <h1>📊 Chanseen | CS CloudHub</h1>
    <span class="subtitle">多职场 · 客服项目统一管理</span>
  </div>
  <div class="header-right">
    <div class="workplace-filter">
      <label>职场筛选：</label>
      <select id="wp-filter">
        <option value="all">全部职场</option>
        <option value="济南">济南</option>
        <option value="淄博">淄博</option>
        <option value="杭州">杭州</option>
        <option value="无锡">无锡</option>
      </select>
    </div>
    <div class="search-box">
      <input type="text" id="global-search" placeholder="搜索项目名称...">
    </div>
  </div>
</header>

<!-- 主容器 -->
<div id="main-container">
  <!-- 左侧模块菜单 -->
  <nav id="sidebar">
    <div class="nav-section" data-section="project">
      <div class="nav-section-title" onclick="toggleSection(this)">
        <span class="section-icon">🗂️</span>
        <span class="section-text">项目管理中控台</span>
        <span class="section-arrow">▶</span>
      </div>
      <a href="#" class="nav-item active" data-module="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-text">项目总览看板</span>
      </a>
      <a href="#" class="nav-item" data-module="archive">
        <span class="nav-icon">📋</span>
        <span class="nav-text">项目基础档案</span>
      </a>
      <a href="#" class="nav-item" data-module="target">
        <span class="nav-icon">🎯</span>
        <span class="nav-text">目标与权责管理</span>
      </a>
      <a href="#" class="nav-item" data-module="operation">
        <span class="nav-icon">📈</span>
        <span class="nav-text">服务与进度追踪</span>
      </a>
      <a href="#" class="nav-item" data-module="cost">
        <span class="nav-icon">💰</span>
        <span class="nav-text">成本与利润管理</span>
      </a>
    </div>
    <div class="nav-section" data-section="collab">
      <div class="nav-section-title" onclick="toggleSection(this)">
        <span class="section-icon">🤝</span>
        <span class="section-text">协同与知识管理</span>
        <span class="section-arrow">▶</span>
      </div>
      <a href="#" class="nav-item" data-module="issue">
        <span class="nav-icon">🐛</span>
        <span class="nav-text">问题与课题协作</span>
      </a>
      <a href="#" class="nav-item" data-module="knowledge">
        <span class="nav-icon">📚</span>
        <span class="nav-text">核心知识能量池</span>
      </a>
      <a href="#" class="nav-item" data-module="risk">
        <span class="nav-icon">⚠️</span>
        <span class="nav-text">项目风险预警池</span>
      </a>
    </div>
    <div class="nav-section" data-section="tools">
      <div class="nav-section-title" onclick="toggleSection(this)">
        <span class="section-icon">🛠️</span>
        <span class="section-text">项目管理工具库</span>
        <span class="section-arrow">▶</span>
      </div>
      <a href="#" class="nav-item" data-module="handover">
        <span class="nav-icon">🔄</span>
        <span class="nav-text">项目承接规范</span>
      </a>
      <a href="#" class="nav-item" data-module="assessment">
        <span class="nav-icon">📊</span>
        <span class="nav-text">项目难度评估</span>
      </a>
      <a href="#" class="nav-item" data-module="satisfaction">
        <span class="nav-icon">💯</span>
        <span class="nav-text">项目运维调研</span>
      </a>
      <a href="#" class="nav-item" data-module="director">
        <span class="nav-icon">👁️</span>
        <span class="nav-text">项目全景解析</span>
      </a>
      <a href="#" class="nav-item" data-module="performance">
        <span class="nav-icon">📈</span>
        <span class="nav-text">客服绩效看板</span>
      </a>
    </div>
    <div class="nav-section" data-section="system">
      <div class="nav-section-title" onclick="toggleSection(this)">
        <span class="section-icon">🔐</span>
        <span class="section-text">系统管理与配置</span>
        <span class="section-arrow">▶</span>
      </div>
      <a href="#" class="nav-item" data-module="permissions">
        <span class="nav-icon">⚙️</span>
        <span class="nav-text">系统权限管理</span>
      </a>
      <a href="#" class="nav-item" data-module="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-text">个人基础设置</span>
      </a>
    </div>
    <!-- 侧边栏折叠按钮 -->
    <button id="sidebar-toggle" class="sidebar-toggle-btn" onclick="toggleSidebar()" title="折叠/展开导航">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0;">
        <line x1="3" y1="5" x2="15" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="12,6 15,9 12,12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="toggle-text">收起导航</span>
    </button>
  </nav>

  <!-- 主内容区 -->
  <main id="content-area">
    <!-- 动态内容加载区 -->
    <div id="module-content"></div>
  </main>
</div>

<!-- 弹窗容器 -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box">
    <div id="modal-header" class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" class="modal-close">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- 移动端侧边栏遮罩 -->
<div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="closeMobileSidebar()"></div>

  <script src="app.js?v=202606021630"></script>
</body>
</html>
